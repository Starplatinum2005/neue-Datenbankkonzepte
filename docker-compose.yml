# User Story 15
version: '3.8' # User Story 6

services:
  mongodb:
    image: mongo:latest
    container_name: pim_database
    restart: always
    ports:
      - "27017:27017"
    environment: # User Story 7
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db # Persistente Speicherung der Daten

  api: # User Story 25
    build: . 
    container_name: pim_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_HOST=mongodb
    depends_on:
      - mongodb

volumes:
  mongodb_data:
