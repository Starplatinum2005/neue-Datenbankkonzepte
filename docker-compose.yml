version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pim_database
    restart: always
    ports:
      - "27017:27017" # Der Standard-Port von MongoDB
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db # Erfüllt deine Must-Story zur Datenpersistenz!

volumes:
  mongodb_data: